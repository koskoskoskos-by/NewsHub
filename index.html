<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NewsHub — актуальные новости политики, медицины и науки.">
    <title>NewsHub — Главные новости</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body itemscope itemtype="https://schema.org/WebPage">

    <a href="#main" class="skip-link">Перейти к основному содержимому</a>

    <header class="header" itemprop="header" itemscope itemtype="https://schema.org/WPHeader">
        <div class="header__container">
            <div class="header__logo" itemprop="publisher" itemscope itemtype="https://schema.org/Organization">
                <meta itemprop="name" content="NewsHub">
                <a href="/" aria-label="На главную NewsHub">
                    <img src="images/logo.jpg" alt="Логотип NewsHub" itemprop="logo">
                </a>
            </div>
            
            <nav class="header__nav" aria-label="Основная навигация">
                <ul class="nav__list">
                    <li><a href="#" data-category="all" class="active">Главное</a></li>
                    <li><a href="#" data-category="Политика">Политика</a></li>
                    <li><a href="#" data-category="Медицина">Медицина</a></li>
                    <li><a href="#" data-category="Наука">Наука</a></li>
                    <li><a href="#" data-category="Мнения">Мнения</a></li>
                    <li><a href="#" data-category="Спорт">Спорт</a></li>
                </ul>
            </nav>

            <div class="header__info">
                <time datetime="2026-02-10T20:26">Вт, 10 20:26</time>
            </div>
        </div>
        <div class="search-container">
            <input type="text" id="news-search" placeholder="Поиск новостей..." aria-label="Поиск">
        </div>
    </header>

   <main id="main" class="main-content" itemprop="mainContentOfPage">
        <h1 class="visually-hidden">Главные новости информационного портала NewsHub</h1>

        <div class="content-layout">
            
            <section class="news-section" aria-labelledby="section-main-title">
                <h2 id="section-main-title" class="section-category">Главное</h2>
                
                <div id="hero-article-container"></div>
                
                <div class="news-grid" id="api-news-container"></div>
            </section>

            <aside class="sidebar" aria-label="Дополнительные сводки">
                <h3 class="sidebar-title">Лента новостей</h3>
                <div id="api-sidebar-container"></div>
            </aside>

        </div>
    </main>
    <footer class="footer" itemprop="footer" itemscope itemtype="https://schema.org/WPFooter">
        <section class="footer__newsletter" aria-label="Подписка на рассылку">
            <p>Наша новостная рассылка уже доступна. Подробности <a href="#">здесь</a></p>
        </section>
        <div class="footer__main">
            <p class="footer__copyright">All Rights Reserved, <span itemprop="copyrightYear">2026</span></p>
        </div>
    </footer>

    <div id="news-modal" class="modal" aria-hidden="true" role="dialog">
        <div class="modal__overlay"></div>
        <div class="modal__container">
            <button class="modal__close" aria-label="Закрыть модальное окно">&times;</button>
            <div class="modal__content">
                <img src="" alt="" class="modal__image">
                <h2 class="modal__title"></h2>
                <div class="modal__body">
                    </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/script.js"></script>
</body>
</html>
